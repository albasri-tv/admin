<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>لوحة المسؤول - مولد كود المباريات</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
:root{--bg:#0b1220;--card:rgba(17,24,39,.94);--card2:rgba(15,23,42,.96);--line:rgba(255,255,255,.10);--text:#fff;--muted:#cbd5e1;--blue:#38bdf8;--green:#10b981;--red:#ef4444;--amber:#f59e0b}
*{box-sizing:border-box}
body{margin:0;padding:14px;background:radial-gradient(circle at 90% 0,rgba(56,189,248,.18),transparent 28%),radial-gradient(circle at 5% 5%,rgba(16,185,129,.12),transparent 24%),var(--bg);font-family:Tajawal,Tahoma;color:var(--text)}
.container{max-width:980px;margin:auto}
.topbar{position:sticky;top:10px;z-index:10;display:flex;align-items:center;justify-content:space-between;gap:10px;padding:14px 16px;border-radius:22px;background:var(--card);border:1px solid var(--line);box-shadow:0 18px 45px rgba(0,0,0,.25);backdrop-filter:blur(12px);margin-bottom:16px}
.title{font-size:19px;font-weight:900}.hint{color:var(--muted);font-size:13px;line-height:1.8}
.date-form{display:flex;gap:8px;align-items:center}.input,select,textarea{width:100%;background:var(--card2);border:1px solid var(--line);border-radius:14px;color:var(--text);padding:12px;font-family:Tajawal;outline:none;margin-bottom:10px}.date-form .input{width:165px;margin:0}
.btn{border:0;border-radius:13px;padding:11px 14px;font-family:Tajawal;font-weight:900;cursor:pointer;color:#fff}.btn-blue{background:#2563eb}.btn-green{background:var(--green)}.btn-red{background:var(--red)}.btn-dark{background:#334155}.btn-amber{background:var(--amber);color:#111827}
.card{background:linear-gradient(180deg,rgba(30,41,59,.96),rgba(15,23,42,.96));border:1px solid var(--line);border-radius:24px;padding:16px;margin-bottom:15px;box-shadow:0 14px 35px rgba(0,0,0,.24)}
.match-head{display:flex;align-items:center;justify-content:space-between;gap:8px}.team{width:35%;text-align:center}.team img{width:66px;height:66px;object-fit:contain}.team-name{font-weight:900;margin-top:7px;line-height:1.5}.center{width:30%;text-align:center}.time{font-size:18px;color:var(--blue);font-weight:900}.score{font-size:25px;font-weight:900}.badge{display:inline-flex;align-items:center;justify-content:center;margin-top:8px;border-radius:999px;padding:6px 13px;font-size:13px;font-weight:900}
.box{margin-top:15px;background:rgba(2,6,23,.38);border:1px solid var(--line);border-radius:20px;padding:14px}.section{font-weight:900;margin:8px 0 11px;color:#e0f2fe}.row{display:grid;grid-template-columns:1fr 1fr;gap:10px}.actions{display:flex;flex-wrap:wrap;gap:10px;margin-top:8px}.servers{margin-top:10px}.server-item{background:rgba(15,23,42,.82);border:1px solid var(--line);border-radius:14px;padding:10px;margin:8px 0;color:var(--muted);font-size:13px;word-break:break-all}.toast{position:fixed;left:50%;bottom:22px;transform:translateX(-50%);background:#0f172a;border:1px solid rgba(255,255,255,.15);padding:12px 16px;border-radius:999px;box-shadow:0 14px 45px rgba(0,0,0,.35);display:none;z-index:99}.empty{text-align:center;padding:30px;background:var(--card);border:1px solid var(--line);border-radius:22px;color:var(--muted)}.manual-panel{display:none;margin-top:12px}.manual-panel.show{display:block}.manual-toggle{width:100%;margin-top:6px;background:#0f766e}
.output-title{color:#86efac;font-size:16px;font-weight:900;margin:0 0 8px}.code-only{direction:ltr;text-align:left;min-height:130px;resize:vertical}
@media(max-width:700px){.topbar{align-items:stretch;flex-direction:column}.date-form{width:100%}.date-form .input{width:100%}.row{grid-template-columns:1fr}.team img{width:54px;height:54px}.team-name{font-size:13px}.card{padding:12px}}
</style>
</head>
<body>
<div class="container">
  <div class="topbar">
    <div>
      <div class="title">لوحة المسؤول HTML</div>
      <div class="hint">اختار قناة أو أضف سيرفر يدوي، ثم اضغط إضافة المباراة. الناتج يظهر كود واحد فقط BSR: بدون HTML.</div>
    </div>
    <div class="date-form">
      <input class="input" type="date" id="dateInput">
      <button class="btn btn-blue" onclick="loadMatches()">جلب المباريات</button>
    </div>
  </div>

  <div id="matchesArea"><div class="empty">اضغط جلب المباريات</div></div>

  <div class="card">
    <div class="output-title">الكود النهائي فقط</div>
    <div class="hint">انسخ هذا الكود وضعه بين علامتي التنصيص في صفحة الجدول عند: window.BSR_MATCHES = "هنا";</div>
    <textarea class="input code-only" id="finalCode" readonly placeholder="BSR:..."></textarea>
    <div class="actions">
      <button class="btn btn-green" onclick="copyFinalCode()">نسخ الكود</button>
      <button class="btn btn-dark" onclick="clearGenerator()">مسح الكل</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const readyChannels = {
  "الثامنة واحد": [
    {label:"الثامنة واحد",url:"https://bbb.exoadash.com/TVD1451/index.mpd",userAgent:"",referer:"",origin:"",drmKey:""}
  ],
  "الثامنة اثنين": [
    {label:"الثامنة اثنين",url:"https://bbb.exoadash.com/TVD1452/index.mpd",userAgent:"",referer:"",origin:"",drmKey:""}
  ],
  "الثامنة ثلاثة": [
    {label:"الثامنة ثلاثة",url:"https://bbb.exoadash.com/TVD1453/index.mpd",userAgent:"",referer:"",origin:"",drmKey:""}
  ],
  "بي إن سبورت 8": [
    {label:"1080p",url:"https://het000.4rouwanda-shop.store/live/lb2/bs8-multi.m3u8",userAgent:"Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/139.0.0.0 Safari/537.36",referer:"",origin:"",drmKey:""},
    {label:"720p",url:"http://het000.4rouwanda-shop.store/live/996251000/index.m3u8",userAgent:"Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/139.0.0.0 Safari/537.36",referer:"",origin:"",drmKey:""},
    {label:"360p",url:"http://het000.4rouwanda-shop.store/live/500021000/index.m3u8",userAgent:"Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/139.0.0.0 Safari/537.36",referer:"",origin:"",drmKey:""},
    {label:"244p",url:"http://het000.4rouwanda-shop.store/live/770001000/index.m3u8",userAgent:"Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/139.0.0.0 Safari/537.36",referer:"",origin:"",drmKey:""}
  ]
};

const selectedMatches = {};
let currentMatches = [];

function setToday(){
  const d = new Date();
  const v = new Date(d.getTime() - d.getTimezoneOffset() * 60000).toISOString().slice(0,10);
  document.getElementById("dateInput").value = v;
}

function toast(t){
  const el = document.getElementById("toast");
  el.textContent = t;
  el.style.display = "block";
  setTimeout(()=>el.style.display="none",1800);
}

function teamLogo(imgName){
  if(!imgName) return "https://via.placeholder.com/80?text=Team";
  const newPath = "https://imgs.ysscores.com/teams/64/" + imgName;
  return "https://images.weserv.nl/?url=" + encodeURIComponent(newPath) + "&errorredirect=" + encodeURIComponent("https://images.weserv.nl/?url=https://imgs.ysscores.com/teams/" + imgName);
}

function getStatusInfo(status, date, time){
  const now = Date.now();
  const ms = Date.parse((date || "") + "T" + (time || ""));
  if(Number(status) === 4) return {text:"انتهت", bg:"#64748b", order:3};
  if([1,2,3].includes(Number(status)) || (!isNaN(ms) && now >= ms)) return {text:"جارية الآن", bg:"#ef4444", order:1};
  return {text:"لم تبدأ", bg:"#10b981", order:2};
}

function arTime(time){
  if(!time) return "";
  const d = new Date("2000-01-01T" + time);
  if(isNaN(d.getTime())) return time;
  let h = d.getHours();
  const min = String(d.getMinutes()).padStart(2,"0");
  const s = h >= 12 ? "م" : "ص";
  h = h % 12; if(h === 0) h = 12;
  return h + ":" + min + " " + s;
}

function matchKey(m){
  return btoa(unescape(encodeURIComponent((m.home_team?.title||"home")+"|"+(m.away_team?.title||"away")+"|"+(m.match_date||"")+"|"+(m.match_time||"")))).replace(/=+$/,"").replace(/[^a-zA-Z0-9]/g,"").slice(0,32);
}

async function loadMatches(){
  const date = document.getElementById("dateInput").value;
  const area = document.getElementById("matchesArea");
  area.innerHTML = '<div class="empty">جاري جلب المباريات...</div>';

  const apiUrl = `https://api-ar.ysscores.com/api/matches/matches_date_get/${date}/%5B%2299376%22,%22408340%22%5D/%5B%5D/%5B%228633%22%5D/IBA/180`;

  try{
    const res = await fetch(apiUrl, {headers:{"Accept":"application/json"}});
    const data = await res.json();
    currentMatches = data.data || [];
    renderMatches();
  }catch(e){
    area.innerHTML = '<div class="empty">تعذر جلب المباريات من المتصفح. افتح الملف على استضافة HTTPS، أو استخدم نسخة PHP إذا كان API يمنع CORS.</div>';
  }
}

function renderMatches(){
  const area = document.getElementById("matchesArea");
  if(!currentMatches.length){
    area.innerHTML = '<div class="empty">لا توجد مباريات لهذا التاريخ</div>';
    return;
  }

  currentMatches.sort((a,b)=>{
    const ia = getStatusInfo(a.status, a.match_date, a.match_time);
    const ib = getStatusInfo(b.status, b.match_date, b.match_time);
    return ia.order - ib.order;
  });

  area.innerHTML = currentMatches.map(m=>{
    const key = matchKey(m);
    const home = m.home_team?.title || "";
    const away = m.away_team?.title || "";
    const st = getStatusInfo(m.status, m.match_date, m.match_time);
    const payload = {
      id:key, home, away,
      homeLogo:teamLogo(m.home_team?.image || ""),
      awayLogo:teamLogo(m.away_team?.image || ""),
      time:m.match_time || "",
      date:m.match_date || document.getElementById("dateInput").value,
      statusText: st.text === "انتهت" ? "انتهت المباراة" : st.text,
      homeScore:m.home_scores || "0",
      awayScore:m.away_scores || "0"
    };

    return `
    <div class="card" id="match-${key}">
      <div class="match-head">
        <div class="team"><img src="${payload.homeLogo}"><div class="team-name">${home}</div></div>
        <div class="center">
          ${st.text === "لم تبدأ" ? `<div class="time">${arTime(m.match_time)}</div>` : `<div class="score">${payload.homeScore} - ${payload.awayScore}</div>`}
          <div class="badge" style="background:${st.bg}">${st.text}</div>
        </div>
        <div class="team"><img src="${payload.awayLogo}"><div class="team-name">${away}</div></div>
      </div>

      <div class="box">
        <div class="section">اختيار قناة جاهزة</div>
        <select class="channel-select">
          <option value="">اختر القناة</option>
          ${Object.keys(readyChannels).map(n=>`<option value="${n}">${n}</option>`).join("")}
        </select>
        <div class="actions">
          <button class="btn btn-blue" onclick='saveReadyChannel("${key}", ${JSON.stringify(payload)}, this)'>حفظ القناة</button>
          <button class="btn btn-green" onclick='publishMatch("${key}", ${JSON.stringify(payload)}, this)'>إضافة المباراة</button>
          <button class="btn btn-red" onclick='unpublishMatch("${key}")'>إلغاء إضافة المباراة</button>
        </div>

        <button class="btn manual-toggle" type="button" onclick='toggleManualPanel("${key}")'>+ إضافة سيرفر يدوي</button>
        <div class="manual-panel">
          <div class="section">إضافة سيرفر يدوي</div>
          <div class="row">
            <input class="input manual-label" placeholder="اسم السيرفر / الجودة">
            <input class="input manual-url" placeholder="رابط السيرفر">
          </div>
          <input class="input manual-ua" placeholder="User-Agent">
          <div class="row">
            <input class="input manual-referer" placeholder="Referer">
            <input class="input manual-origin" placeholder="Origin">
          </div>
          <input class="input manual-drm" placeholder="Clear Key مثال kid:key">
          <div class="actions">
            <button class="btn btn-amber" onclick='addManualServer("${key}", ${JSON.stringify(payload)}, this)'>حفظ السيرفر اليدوي</button>
          </div>
        </div>

        <div class="servers" data-key="${key}"><div class="hint">لم تتم إضافة المباراة للمولد بعد.</div></div>
      </div>
    </div>`;
  }).join("");
}

function ensureMatch(key,payload){
  if(!selectedMatches[key]){
    selectedMatches[key] = {...payload, servers:[]};
  }
}

function cleanServer(s){
  return {
    label:s.label || s.name || "Server",
    url:s.url || "",
    userAgent:s.userAgent || s.ua || "",
    referer:s.referer || s.ref || "",
    origin:s.origin || "",
    drmKey:s.drmKey || s.clearKey || ""
  };
}

function saveReadyChannel(key,payload,btn){
  const card = document.getElementById("match-" + key);
  const select = card.querySelector(".channel-select");
  const name = select.value;
  if(!name || !readyChannels[name]){
    toast("اختار قناة أولاً");
    return false;
  }

  ensureMatch(key,payload);
  selectedMatches[key].servers = readyChannels[name].map(cleanServer);
  updateServerBox(key);
  updateFinalCode();
  toast("تم حفظ القناة");
  return true;
}

function addManualServer(key,payload,btn){
  const card = document.getElementById("match-" + key);
  const panel = card.querySelector(".manual-panel");
  const label = panel.querySelector(".manual-label").value.trim() || "Server";
  const url = panel.querySelector(".manual-url").value.trim();
  const userAgent = panel.querySelector(".manual-ua").value.trim();
  const referer = panel.querySelector(".manual-referer").value.trim();
  const origin = panel.querySelector(".manual-origin").value.trim();
  const drmKey = panel.querySelector(".manual-drm").value.trim();

  if(!url){
    toast("ضع رابط السيرفر أولاً");
    return;
  }

  ensureMatch(key,payload);
  selectedMatches[key].servers.push({label,url,userAgent,referer,origin,drmKey});
  updateServerBox(key);
  updateFinalCode();
  toast("تم حفظ السيرفر اليدوي");
}

function publishMatch(key,payload,btn){
  ensureMatch(key,payload);

  if(!selectedMatches[key].servers.length){
    const saved = saveReadyChannel(key,payload,btn);
    if(!saved){
      toast("لا يمكن إضافة المباراة بدون قناة أو سيرفر");
      return;
    }
  }

  selectedMatches[key].published = true;
  updateServerBox(key);
  updateFinalCode();
  toast("تمت إضافة المباراة للكود");
}

function unpublishMatch(key){
  if(selectedMatches[key]) delete selectedMatches[key];
  updateServerBox(key);
  updateFinalCode();
  toast("تم حذف المباراة من الكود");
}

function toggleManualPanel(key){
  const card = document.getElementById("match-" + key);
  card.querySelector(".manual-panel").classList.toggle("show");
}

function updateServerBox(key){
  const box = document.querySelector('.servers[data-key="'+key+'"]');
  const m = selectedMatches[key];

  if(!box) return;
  if(!m){
    box.innerHTML = '<div class="hint">لم تتم إضافة المباراة للمولد بعد.</div>';
    return;
  }

  if(!m.servers.length){
    box.innerHTML = '<div class="hint">لا توجد سيرفرات. اختار قناة أو أضف سيرفر يدوي.</div>';
    return;
  }

  box.innerHTML = m.servers.map((s,i)=>`<div class="server-item">${i+1}) ${s.label}<br>${s.url}</div>`).join("");
}

function shortPayload(){
  const list = Object.values(selectedMatches)
    .filter(m => m && m.servers && m.servers.length)
    .map(m => ({
      h:m.home, a:m.away, hl:m.homeLogo, al:m.awayLogo, t:m.time, d:m.date,
      st:m.statusText, hs:m.homeScore, as:m.awayScore,
      s:m.servers.map(x=>({n:x.label,u:x.url,ua:x.userAgent,r:x.referer,o:x.origin,ck:x.drmKey}))
    }));

  return {m:list};
}

function encodeBsr(obj){
  const json = JSON.stringify(obj);
  return "BSR:" + btoa(unescape(encodeURIComponent(json))).replace(/=+$/,"");
}

function updateFinalCode(){
  const code = encodeBsr(shortPayload());
  const has = Object.values(selectedMatches).some(m => m && m.servers && m.servers.length);
  document.getElementById("finalCode").value = has ? code : "";
}

async function copyFinalCode(){
  const code = document.getElementById("finalCode").value.trim();
  if(!code){
    toast("لا يوجد كود للنسخ");
    return;
  }

  try{
    await navigator.clipboard.writeText(code);
    toast("تم نسخ الكود");
  }catch(e){
    const ta = document.getElementById("finalCode");
    ta.select();
    document.execCommand("copy");
    toast("تم نسخ الكود");
  }
}

function clearGenerator(){
  Object.keys(selectedMatches).forEach(k=>delete selectedMatches[k]);
  document.querySelectorAll(".servers").forEach(el=>el.innerHTML='<div class="hint">لم تتم إضافة المباراة للمولد بعد.</div>');
  document.getElementById("finalCode").value = "";
  toast("تم مسح المولد");
}

setToday();
</script>
</body>
</html>
